; ─────────────────────────────────────────────
;  MyPerpus — PHP Configuration (Development)
; ─────────────────────────────────────────────

[PHP]
; Error Reporting — tampilkan semua error saat dev
error_reporting          = E_ALL
display_errors           = On
display_startup_errors   = On
log_errors               = On
error_log                = /var/log/php_errors.log

; Upload — untuk cover buku & PDF
upload_max_filesize      = 100M
post_max_size            = 110M
max_file_uploads         = 20

; Memory & Execution
memory_limit             = 256M
max_execution_time       = 120
max_input_time           = 120
max_input_vars           = 3000

; Timezone
date.timezone            = Asia/Jakarta

; Session
session.gc_maxlifetime   = 7200

; OPcache — Matikan saat dev agar perubahan kode langsung terlihat
opcache.enable           = 0
opcache.enable_cli       = 0

; Realpath cache
realpath_cache_size      = 4096K
realpath_cache_ttl       = 120
