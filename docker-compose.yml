name: myperpus

x-app-environment: &app-environment
  APP_ENV: local
  APP_DEBUG: "true"
  APP_TIMEZONE: Asia/Jakarta
  APP_URL: http://localhost:8000
  LOG_CHANNEL: stack
  LOG_LEVEL: debug
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: myperpus
  DB_USERNAME: myperpus_user
  DB_PASSWORD: myperpus_pass
  BROADCAST_CONNECTION: log
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  MAIL_MAILER: smtp
  MAIL_HOST: mailpit
  MAIL_PORT: "1025"
  MAIL_USERNAME: null
  MAIL_PASSWORD: null
  MAIL_ENCRYPTION: null
  MAIL_FROM_ADDRESS: noreply@myperpus.id
  MAIL_FROM_NAME: MyPerpus
  FILESYSTEM_DISK: public
  VITE_APP_NAME: MyPerpus
  VITE_APP_URL: http://localhost:8000

x-app-volumes: &app-volumes
  - ./:/var/www/html
  - myperpus_vendor:/var/www/html/vendor
  - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: myperpus_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - myperpus_net

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    image: myperpus_php:dev
    container_name: myperpus_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes: *app-volumes
    environment:
      <<: *app-environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - myperpus_net

  queue:
    image: myperpus_php:dev
    container_name: myperpus_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=2 --tries=3 --timeout=90
    volumes: *app-volumes
    environment:
      <<: *app-environment
    depends_on:
      php:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - myperpus_net

  scheduler:
    image: myperpus_php:dev
    container_name: myperpus_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes: *app-volumes
    environment:
      <<: *app-environment
    depends_on:
      php:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - myperpus_net

  mysql:
    image: mysql:8.0
    container_name: myperpus_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: myperpus
      MYSQL_USER: myperpus_user
      MYSQL_PASSWORD: myperpus_pass
    volumes:
      - myperpus_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - myperpus_net

  redis:
    image: redis:7.2-alpine
    container_name: myperpus_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - myperpus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - myperpus_net

  node:
    image: node:20-alpine
    container_name: myperpus_node
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./:/var/www/html
      - myperpus_node_modules:/var/www/html/node_modules
    environment:
      VITE_DEV_HOST: 0.0.0.0
      VITE_HMR_HOST: localhost
      VITE_DEV_PORT: "5173"
    command: sh -c "if [ ! -d node_modules/.bin ]; then npm ci; fi; npm run dev -- --host 0.0.0.0"
    networks:
      - myperpus_net

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: myperpus_mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - myperpus_net

volumes:
  myperpus_mysql_data:
  myperpus_redis_data:
  myperpus_vendor:
  myperpus_node_modules:

networks:
  myperpus_net:
    driver: bridge
