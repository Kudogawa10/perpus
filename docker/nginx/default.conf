###############################################################
#  MyPerpus — Nginx Configuration
#  Laravel dengan Inertia.js (SPA routing)
###############################################################

server {
    listen       80;
    server_name  localhost;
    root         /var/www/html/public;
    index        index.php;

    charset utf-8;

    # ── Logging ──────────────────────────────────────────────
    access_log  /var/log/nginx/myperpus_access.log;
    error_log   /var/log/nginx/myperpus_error.log;

    # ── Gzip Compression ─────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml
                    application/xml application/xml+rss
                    text/javascript;
    gzip_min_length 1000;

    # ── Max upload size (sesuai php.ini) ─────────────────────
    client_max_body_size 110M;

    # ── Vite HMR Proxy (development hot reload) ──────────────
    location /@vite {
        proxy_pass         http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Coba serve static file dulu, fallback ke Vite
        try_files $uri @vite_fallback;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location @vite_fallback {
        proxy_pass         http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
    }

    # PDF buku harus lewat route terautentikasi /baca-online/{buku}/pdf
    location ^~ /storage/buku/pdf/ {
        deny all;
        return 404;
    }

    location ^~ /storage/sample-books/ {
        deny all;
        return 404;
    }

    # ── Laravel SPA Routing (Inertia.js) ─────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ──────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass        php:9000;
        fastcgi_index       index.php;
        fastcgi_buffers     16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param       SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include             fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ── Blokir akses ke file sensitif ────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}
