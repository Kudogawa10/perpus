###############################################################
#  MyPerpus — Docker Compose (Development)
#  Stack: Nginx + PHP 8.2-FPM + MySQL 8.0 + Redis + Node
###############################################################

services:

  # ─────────────────────────────────────────
  #  NGINX — Web Server
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: myperpus_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - myperpus_net

  # ─────────────────────────────────────────
  #  PHP 8.2-FPM — Laravel Backend
  # ─────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: myperpus_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - PHP_OPCACHE_ENABLE=0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - myperpus_net

  # ─────────────────────────────────────────
  #  MYSQL 8.0 — Database
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: myperpus_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306" # Expose lokal agar DBeaver bisa konek
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: myperpus
      MYSQL_USER: myperpus_user
      MYSQL_PASSWORD: myperpus_pass
    volumes:
      - myperpus_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - myperpus_net

  # ─────────────────────────────────────────
  #  REDIS — Cache & Session
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: myperpus_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - myperpus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - myperpus_net

  # ─────────────────────────────────────────
  #  NODE — Frontend Dev Server (Vite HMR)
  # ─────────────────────────────────────────
  node:
    image: node:20-alpine
    container_name: myperpus_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "127.0.0.1:5173:5173" # Vite HMR port lokal
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - myperpus_net

# ─────────────────────────────────────────
#  VOLUMES — Data persisten
# ─────────────────────────────────────────
volumes:
  myperpus_mysql_data:
    driver: local
  myperpus_redis_data:
    driver: local


# ─────────────────────────────────────────
#  NETWORKS
# ─────────────────────────────────────────
networks:
  myperpus_net:
    driver: bridge
